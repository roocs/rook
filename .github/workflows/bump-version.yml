name: Conditional Bump Version

on:
  push:
    branches:
      - main
    paths-ignore:
      - .*
      - .github/**.md
      - .github/**.yml
      - AUTHORS.rst
      - CHANGELOG.rst
      - CI/**.in
      - CI/**.txt
      - CODE_OF_CONDUCT.rst
      - CONTRIBUTING.rst
      - Dockerfile
      - Makefile
      - README.rst
      - docker-compose.yml
      - docs/**.ipynb
      - docs/**.py
      - docs/**.rst
      - docs/Makefile
      - docs/_static/*
      - environment-dev.yml
      - environment-docs.yml
      - environment.yml
      - pyproject.toml
      - test/**.py
      - tox.toml
      - src/$rook/__version__.py

permissions:
  contents: read

jobs:
  bump_patch_version:
    name: Bump build/patch version
    if: ${{ secrets.BIRDHOUSE_HELPER_BOT_ID != '' && secrets.BIRDHOUSE_HELPER_BOT_KEY != '' && secrets.BIRDHOUSE_HELPER_BOT_GPG_PRIVATE_KEY != '' && secrets.BIRDHOUSE_HELPER_BOT_GPG_PRIVATE_KEY_PASSWORD != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        python-version: [ "3.13" ]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443

      - name: Generate App Token
        id: token_generator
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.BIRDHOUSE_HELPER_BOT_ID }}
          private-key: ${{ secrets.BIRDHOUSE_HELPER_BOT_KEY }}
          permission-contents: write

      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.token_generator.outputs.token }}
          persist-credentials: false

      - name: Set up Python${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Import GPG Key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.BIRDHOUSE_HELPER_BOT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.BIRDHOUSE_HELPER_BOT_GPG_PRIVATE_KEY_PASSWORD }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          trust_level: 5

      - name: Install CI libraries
        run: |
          python -m pip install --require-hashes -r CI/requirements_ci.txt

      - name: Conditional Bump
        run: |
          CURRENT_VERSION=$(bump-my-version show current_version)
          if [[ ${CURRENT_VERSION} =~ -dev(\.\d+)? ]]; then
            echo "Development version (ends in 'dev(\.\d+)?'), bumping 'build' version"
            bump-my-version bump build
          else
            echo "Version is stable, bumping 'patch' version"
            bump-my-version bump patch
          fi
          echo "new_version=$(bump-my-version show current_version)"

      - name: Push Changes
        uses: ad-m/github-push-action@881a6320fdb16eb5318c5054f31c218aec2b324c # v1.3.0
        with:
          force: false
          branch: ${{ github.ref }}
          github_token: ${{ steps.token_generator.outputs.token }}
