name: conda-lock health

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  lock-health:
    name: Lock Refresh Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Conda (Micromamba)
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3.0.0
        with:
          cache-downloads: true
          cache-environment: true
          post-cleanup: none
          environment-name: lockcheck
          create-args: >-
            python=3.12 conda-lock=4.0.0
          channels: conda-forge

      - name: Try lock/spec generation
        run: micromamba run -n lockcheck make conda-lock
