name: build ⚙️

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  # For a given workflow, if we push to the same branch, cancel all previous builds on that branch except on main.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Python${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.11"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: |
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443

      - name: Checkout Repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Python${{ matrix.python-version }}
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install linting libraries
        run: python -m pip install ruff

      - name: Run Lint 📦
        run: make lint

  conda-artifacts:
    name: Verify Conda Artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Conda (Micromamba)
        uses: mamba-org/setup-micromamba@0dea6379afdaffa5d528b3d1dabc45da37f443fc # v2.0.4
        with:
          cache-downloads: true
          cache-environment: true
          environment-name: lockcheck
          create-args: >-
            python=3.12 conda-lock=4.0.0
          channels: conda-forge

      - name: Check conda-lock.yml matches environment.yml input hash
        run: |
          set +e
          micromamba run -n lockcheck conda-lock lock -f environment.yml -p linux-64 --lockfile conda-lock.yml --check-input-hash
          exit_code=$?
          set -e
          if [ "$exit_code" -ne 0 ] && [ "$exit_code" -ne 4 ]; then
            echo "conda-lock input hash check failed."
            exit 1
          fi
          git diff --exit-code -- conda-lock.yml

      - name: Check linux-64.spec matches committed conda-lock.yml
        run: |
          micromamba run -n lockcheck conda-lock render -p linux-64 -k explicit conda-lock.yml
          cmp --silent linux-64.spec conda-linux-64.lock || (echo "linux-64.spec is out of date with conda-lock.yml" && diff -u linux-64.spec conda-linux-64.lock && exit 1)

  build:
    name: Conda Build with Python${{ matrix.python-version }}
    needs: [lint, conda-artifacts]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Install system packages
        run: sudo apt-get -y install pandoc graphviz

      - name: Setup Conda (Micromamba) with Python${{ matrix.python-version }}
        uses: mamba-org/setup-micromamba@0dea6379afdaffa5d528b3d1dabc45da37f443fc # v2.0.4
        with:
          cache-downloads: true
          cache-environment: true
          environment-file: environment.yml
          create-args: >-
            python=${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --editable ".[dev]"

      - name: Test with pytest ⚙️
        run: pytest -v -m "not slow and not online" tests/

  docs:
    name: Docs (Python${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.11"
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7 # v2.10.1
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: |
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443

      - name: Checkout Repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Setup Python${{ matrix.python-version }}
        uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v5.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install rook with dev requirements 📦
        run: python -m pip install -e ".[dev]"

      - name: Build Docs 📚
        run: make docs
